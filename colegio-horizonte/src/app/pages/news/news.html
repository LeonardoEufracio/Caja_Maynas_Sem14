<app-page-header
  title="Noticias"
  subtitle="Actualidad, logros y actividades de la comunidad educativa Horizonte."
/>

<section class="section-padding pt-4">
  <div class="container">
    <div class="row g-4">
      @for (article of articles; track article.title) {
        <div class="col-md-6">
          <article class="card public-card h-100">
            <div class="card-body p-4 d-flex flex-column">
              <div class="d-flex flex-wrap gap-2 mb-3">
                <span class="badge badge-horizonte">{{ article.category }}</span>
                <span class="badge badge-horizonte-outline">{{ article.date }}</span>
              </div>
              <h2 class="h5 text-horizonte-blue">{{ article.title }}</h2>
              <p class="text-muted flex-grow-1">{{ article.summary }}</p>
              <button type="button" class="btn btn-outline-primary align-self-start" disabled>
                Leer más
              </button>
            </div>
          </article>
        </div>
      }
    </div>
  </div>
</section>
