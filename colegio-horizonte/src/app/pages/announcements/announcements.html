<app-page-header
  title="Comunicados"
  subtitle="Información oficial para padres, estudiantes y docentes de la I.E.P. Horizonte."
/>

<section class="section-padding pt-4">
  <div class="container">
    <div class="row g-3">
      @for (item of items; track item.title) {
        <div class="col-12">
          <div class="card public-card">
            <div class="card-body p-4">
              <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-2">
                <span class="badge badge-horizonte-outline">{{ item.date }}</span>
                <span class="badge bg-secondary">{{ item.status }}</span>
              </div>
              <h2 class="h5 text-horizonte-blue mb-1">{{ item.title }}</h2>
              <p class="small text-muted mb-2"><strong>Nivel:</strong> {{ item.level }}</p>
              <p class="text-muted mb-0">{{ item.description }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
