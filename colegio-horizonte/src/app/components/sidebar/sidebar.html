<aside class="sidebar">
  <div class="sidebar__brand">
    <span class="sidebar__brand-title">HORIZONTE</span>
    <span class="sidebar__brand-subtitle">Intranet académica</span>
  </div>

  <nav class="sidebar__nav" aria-label="Menú intranet">
    <ul class="sidebar__list list-unstyled mb-0">
      @for (link of links; track link.label) {
        <li>
          @if (link.route) {
            <a
              class="sidebar__link"
              [routerLink]="link.route"
              routerLinkActive="sidebar__link--active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              {{ link.label }}
            </a>
          } @else {
            <span class="sidebar__link sidebar__link--disabled">{{ link.label }}</span>
          }
        </li>
      }
    </ul>
  </nav>
</aside>
